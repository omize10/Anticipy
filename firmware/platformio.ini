; Anticipy Pendant — PlatformIO project configuration
; Target: Seeed XIAO ESP32-S3 (ESP32-S3 dual-core, 8MB flash, 8MB PSRAM)
; Framework: Arduino (uses ESP-IDF 5.x underneath)
; Build: pio run --target upload

[env:xiao_esp32s3]
platform  = espressif32 @ ^6.9.0
board     = seeed_xiao_esp32s3
framework = arduino

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize

; Flash speed (XIAO supports up to 921600)
upload_speed = 921600

; Partition table: 3MB app0 + 3MB app1 (OTA) + NVS + SPIFFS
board_build.partitions = partitions_ota.csv

; Enable PSRAM
build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCORE_DEBUG_LEVEL=0
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=8192
  -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240=1
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1

; Libraries
lib_deps =
  bblanchon/ArduinoJson @ ^7.2.0
  adafruit/Adafruit NeoPixel @ ^1.12.3

; LittleFS for config file storage (optional, NVS used for credentials)
lib_ldf_mode = deep

; Extra flags for release builds
[env:xiao_esp32s3_release]
extends = env:xiao_esp32s3
build_flags =
  ${env:xiao_esp32s3.build_flags}
  -DNDEBUG
  -Os
