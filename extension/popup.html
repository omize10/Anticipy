<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0C0C0C;
      color: #FAFAFA;
    }
    .header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-family: Georgia, serif;
      font-size: 18px;
      color: #C8A97E;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8A8A8A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF5252;
    }
    .status-dot.connected {
      background: #4CAF50;
    }
    .actions {
      padding: 12px 20px;
      max-height: 280px;
      overflow-y: auto;
    }
    .actions-label {
      font-size: 10px;
      color: #5A5A5A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .action-item {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .action-badge {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .badge-critical { background: rgba(239,68,68,0.15); color: #ef4444; }
    .badge-important { background: rgba(251,146,60,0.15); color: #fb923c; }
    .badge-standard { background: rgba(200,169,126,0.15); color: #C8A97E; }
    .badge-low { background: rgba(138,138,138,0.1); color: #8A8A8A; }
    .action-summary {
      font-size: 13px;
      line-height: 1.4;
    }
    .action-time {
      font-size: 10px;
      color: #5A5A5A;
      margin-top: 4px;
    }
    .empty {
      text-align: center;
      padding: 32px 20px;
      color: #5A5A5A;
      font-size: 13px;
    }
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .open-engine {
      display: inline-block;
      padding: 8px 20px;
      background: #C8A97E;
      color: #0C0C0C;
      text-decoration: none;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .open-engine:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Anticipy</span>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="actions" id="actionsContainer">
    <div class="empty" id="emptyState">No recent actions</div>
  </div>

  <div class="footer">
    <button class="open-engine" id="openEngine">Open Engine</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
